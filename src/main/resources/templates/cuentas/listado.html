<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>listado</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body>
<div class="user-panel mt-3 pb-3 mb-3 d-flex">
    <div class="info">
        <a href="#" class="d-block">
            Bienvenido: <span th:text="${usuarioLogueado}">Nombre de Usuario</span>
        </a>
    </div>
</div>
<ul class="navbar-nav ml-auto">
    <li class="nav-item">
        <span class="nav-link">
            <i class="fas fa-user"></i>
            <b th:text="${usuarioLogueado}"></b> </span>
    </li>
</ul>

<div class="container">
    <h2>Listado de Cuentas</h2>

    <div class="mb-3">
        <a th:href="@{/auth/login}" class="btn btn-primary">login</a>
        <a th:href="@{/cuentas/nueva}" class="btn btn-primary">Agregar Cuenta</a>
        <a th:href="@{/transacciones/nuevo}" class="btn btn-success">Realizar Transferencia</a>
        <a th:href="@{/transacciones/estadisticas}" class="btn btn-info">Ver Estadísticas</a>
    </div>

    <table class="table table-bordered table-striped table-hover mt-3">
        <thead class="thead-dark">
        <tr>
            <th style="width: 50px;">ID</th>
            <th>Titular de la Cuenta</th>
            <th>Saldo Actual</th>
            <th class="text-center" style="width: 200px;">Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="cuenta : ${cuentas}">
            <td th:text="${cuenta.id}" class="font-weight-bold"></td>
            <td th:text="${cuenta.titular}"></td>
            <td th:text="${'$' + cuenta.saldo}"></td>
            <td class="text-center">
                <div class="btn-group" role="group">
                    <a th:href="@{/cuentas/editar/{id}(id=${cuenta.id})}"
                       class="btn btn-warning btn-sm">
                        <i class="fas fa-edit"></i> Actualizar
                    </a>
                    <a th:href="@{/cuentas/eliminar/{id}(id=${cuenta.id})}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('¿Estás seguro de eliminar la cuenta de ' + [[${cuenta.titular}]] + '?');">
                        <i class="fas fa-trash"></i> Eliminar
                    </a>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
