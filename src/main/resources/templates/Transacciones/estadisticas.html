<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Sistema X | Estadísticas</title>
    <link rel="stylesheet" href="/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="/plugins/fontawesome-free/css/all.min.css">
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">

    <nav class="main-header navbar navbar-expand navbar-white navbar-light">
        <ul class="navbar-nav ml-auto">
            <li class="nav-item">
                <span class="nav-link"><i class="fas fa-user"></i> <span th:text="${usuarioLogueado}"></span></span>
            </li>
        </ul>
    </nav>

    <aside class="main-sidebar sidebar-dark-primary elevation-4">
        <div class="sidebar">
            <nav class="mt-2">
                <ul class="nav nav-pills nav-sidebar flex-column" role="menu">
                    <li class="nav-item"><a th:href="@{/auth/login}" class="nav-link"><p>Inicio</p></a></li>
                    <li class="nav-item"><a th:href="@{/cuentas}" class="nav-link"><p>Cuentas</p></a></li>
                    <li class="nav-item"><a th:href="@{/transacciones}" class="nav-link"><p>Transacciones</p></a></li>
                    <li class="nav-item"><a th:href="@{/estadisticas}" class="nav-link active"><p>Estadísticas</p></a></li>
                    <li class="nav-item"><a th:href="@{/auth/login}" class="nav-link"><p>Salir</p></a></li>
                </ul>
            </nav>
        </div>
    </aside>

    <div class="content-wrapper">
        <section class="content-header"><h1>Estadísticas del Sistema</h1></section>
        <section class="content">
            <div class="container-fluid">
                <div class="row">
                    <div class="col-md-6">
                        <div class="card card-danger">
                            <div class="card-header"><h3 class="card-title">Donut Chart</h3></div>
                            <div class="card-body"><canvas id="donutChart" style="min-height: 250px;"></canvas></div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card card-success">
                            <div class="card-header"><h3 class="card-title">Bar Chart</h3></div>
                            <div class="card-body"><canvas id="barChart" style="min-height: 250px;"></canvas></div>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <div class="card card-danger">
                            <div class="card-header"><h3 class="card-title">Pie Chart</h3></div>
                            <div class="card-body"><canvas id="pieChart" style="min-height: 250px;"></canvas></div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card card-success">
                            <div class="card-header"><h3 class="card-title">Stacked Bar Chart</h3></div>
                            <div class="card-body"><canvas id="stackedBarChart" style="min-height: 250px;"></canvas></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>

<script src="/plugins/jquery/jquery.min.js"></script>
<script src="/plugins/chart.js/Chart.min.js"></script>

<script>
    $(function () {
      // Ejemplo de configuración para la gráfica de Pastel (Pie Chart)
      var pieData = {
        labels: ['Chrome', 'IE', 'FireFox', 'Safari', 'Opera'],
        datasets: [{
          data: [700, 500, 400, 600, 300],
          backgroundColor: ['#f56954', '#00a65a', '#f39c12', '#00c0ef', '#3c8dbc'],
        }]
      }
      var pieChartCanvas = $('#pieChart').get(0).getContext('2d')
      new Chart(pieChartCanvas, { type: 'pie', data: pieData })

      // Aquí repetirías la lógica para Donut, Bar y Stacked Bar siguiendo la documentación de AdminLTE
    })
</script>
</body>
</html>
